# ActPlane end-to-end example cases (E1–E12 from docs/taint-dsl.md).
# Data for script/e2e_examples.sh — the shell script is only the driver.
#
# Each case:
#   name     : human label
#   policy   : the taint-DSL policy text (compiled standalone per case)
#   setup    : (optional) shell run before the trigger, for per-case fixtures
#   trigger  : shell run AFTER the enforcer attaches; performs the
#              denied (and, where relevant, the allowed/declassified) action
#   expect   : how to judge the enforcer's NDJSON output. Two modes:
#                want  + notwant      -> `want` regex must appear, `notwant` must not
#                count + re           -> exactly `count` lines match `re`
#
# `${D}` is the per-run workspace dir; the driver substitutes it. The driver
# seeds these fixtures in ${D}: dirs work/ downloads/ customers/ data/ shared/;
# /bin/bash copied to codex research-agent task-a task-b human-approve confirm
# redact migrate pytest; /bin/true copied to git deploy; files sec.env,
# downloads/inj, customers/rec, data/prod.db.
#
# Cases are loaded separately on purpose: several contradict by design
# (E9 "no git at all" subsumes E5/E11 "git ok if tested/confirmed"), so no
# single merged policy could show both E9 and E5's allow-path.

cases:
  - name: "E1  secret no-exfil (+E8 declassify)"
    policy: |-
      source SECRET = file "**/sec.env"
      rule no-exfil:
        kill connect endpoint "*" if SECRET
        because "secret data must not leave the host; redact first"
      declassify SECRET by exec "**/redact"
    trigger: |-
      read x < ${D}/sec.env; timeout 1 bash -c 'exec 3<>/dev/tcp/1.1.1.1/80'; ${D}/redact -c 'timeout 1 bash -c "exec 4<>/dev/tcp/1.1.1.2/80"'
    expect:
      want: '"target":"1.1.1.1"'
      notwant: '"target":"1.1.1.2"'

  # NB: doc writes "**/downloads/**"; the kernel matcher has no infix glob
  # (only exact/prefix/suffix/any), so we use the concrete prefix form here.
  - name: "E2  injected-priv (+endorse suppress)"
    policy: |-
      source UNTRUST = file "${D}/downloads/**"
      rule no-injected-priv:
        kill exec "git" "push" if UNTRUST and not REVIEWED
        because "action derived from untrusted input; needs human review"
      endorse REVIEWED by exec "**/human-approve"
    trigger: |-
      ${D}/codex -c 'read x < ${D}/downloads/inj; ${D}/git push'; ${D}/codex -c 'read x < ${D}/downloads/inj; ${D}/human-approve -c "${D}/git push"'
    expect:
      count: 1
      re: '"comm":"git"'

  - name: "E3  mandatory mediation (lineage)"
    policy: |-
      rule mediate-proddb:
        kill open file "**/prod.db" unless lineage-includes exec "**/migrate"
        because "prod.db is reachable only through the migration tool"
    trigger: |-
      ${D}/codex -c 'cat ${D}/data/prod.db'; ${D}/migrate -c 'cat ${D}/data/prod.db'
    expect:
      count: 1
      re: '"target":"[^"]*prod.db"'

  - name: "E4  workspace confinement"
    setup: |-
      echo > ${D}/outside.txt; echo > ${D}/work/in.txt
    policy: |-
      source AGENT = exec "**/codex"
      rule confine-writes:
        kill unlink file "${D}/**" if AGENT unless target "${D}/work/**"
        because "agent may only modify its workspace work/**"
    trigger: |-
      ${D}/codex -c 'rm -f ${D}/outside.txt'; ${D}/codex -c 'rm -f ${D}/work/in.txt'
    expect:
      want: '"target":"[^"]*outside.txt"'
      notwant: '"target":"[^"]*work/in.txt"'

  - name: "E5  test-before-commit (after)"
    policy: |-
      source AGENT = exec "**/codex"
      rule test-before-commit:
        kill exec "git" "commit" if AGENT unless after exec "**/pytest"
        because "run the test suite before committing"
    trigger: |-
      ${D}/codex -c '${D}/git commit'; ${D}/codex -c '${D}/pytest -c true; ${D}/git commit'
    expect:
      count: 1
      re: '"comm":"git"'

  - name: "E6  read-only sub-agent scope"
    policy: |-
      source RESEARCH = exec "**/research-agent"
      rule research-readonly:
        kill exec "git" if RESEARCH
        because "research sub-agent is read-only; spawn an executor for changes"
    trigger: |-
      ${D}/research-agent -c '${D}/git status'
    expect:
      want: '"comm":"git"'

  - name: "E7  transitive secret derivation"
    policy: |-
      source SECRET = file "**/sec.env"
      rule no-exfil:
        kill connect endpoint "*" if SECRET
        because "secret data must not leave the host; redact first"
    trigger: |-
      ${D}/codex -c 'read x < ${D}/sec.env; echo derived > ${D}/data/out.json'; sleep 0.3; /bin/bash -c 'read y < ${D}/data/out.json; timeout 1 bash -c "exec 3<>/dev/tcp/3.3.3.3/80"'
    expect:
      want: '"target":"3.3.3.3"'

  - name: "E9  cross-tool unbypassable git"
    policy: |-
      source AGENT = exec "**/codex"
      rule no-git:
        kill exec "git" if AGENT
        because "this agent must not invoke git on any path"
    trigger: |-
      ${D}/codex -c '${D}/git status'; /bin/bash -c '${D}/git status'
    expect:
      count: 1
      re: '"comm":"git"'

  # provenance-scoped egress (hostname *.internal adapted to IP scope 127.x)
  - name: "E10 provenance-scoped egress"
    policy: |-
      source PII = file "${D}/customers/**"
      rule pii-egress:
        kill connect endpoint "*" if PII unless target "127."
        because "PII-handling process may only reach internal endpoints"
    trigger: |-
      ${D}/codex -c 'read x < ${D}/customers/rec; timeout 1 bash -c "exec 3<>/dev/tcp/8.8.8.8/80"; timeout 1 bash -c "exec 4<>/dev/tcp/127.0.0.1/80"'
    expect:
      want: '"target":"8.8.8.8"'
      notwant: '"target":"127.0.0.1"'

  - name: "E11 destructive needs confirm gate"
    policy: |-
      source AGENT = exec "**/codex"
      rule confirm-destructive:
        kill exec "git" "--force" if AGENT unless lineage-includes exec "**/confirm"
        because "destructive action needs an explicit confirm step in its lineage"
    trigger: |-
      ${D}/codex -c '${D}/git --force'; ${D}/codex -c '${D}/confirm -c "${D}/git --force"'
    expect:
      count: 1
      re: '"comm":"git"'

  - name: "E12 task non-interference (A and B)"
    policy: |-
      source TASK_A = exec "**/task-a"
      source TASK_B = exec "**/task-b"
      rule no-cross-task-commit:
        kill exec "git" "commit" if TASK_A and TASK_B
        because "a commit must not mix data from task A and task B"
    trigger: |-
      ${D}/task-a -c '${D}/task-b -c "${D}/git commit"'; ${D}/task-a -c '${D}/git commit'
    expect:
      count: 1
      re: '"comm":"git"'

  # v2 staleness (docs/taint-dsl-v2.md). `since` makes the pytest gate go stale
  # when work/** is edited again — which v1's latching `after` (E5) misses.
  #  session 1: pytest -> commit                  => FRESH, allowed (no kill)
  #  session 2: pytest -> edit work/foo -> commit => STALE, killed
  # exactly one git violation proves both the allow-path and the staleness-path.
  - name: "E5b test-before-commit goes stale (since)"
    policy: |-
      source AGENT = exec "**/codex"
      rule test-before-commit:
        kill exec "git" "commit"
          if AGENT
          unless after exec "**/pytest" since write "${D}/work/**"
        because "tests are stale — you edited code after the last run"
    trigger: |-
      ${D}/codex -c '${D}/pytest -c true; ${D}/git commit'; ${D}/codex -c '${D}/pytest -c true; echo x > ${D}/work/foo; ${D}/git commit'
    expect:
      count: 1
      re: '"comm":"git"'
