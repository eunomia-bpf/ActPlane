- statement_id: 10
  text: "### Adding a Slash Command\n\n1. Add a `CommandDef` entry to `COMMAND_REGISTRY` in `hermes_cli/commands.py`:\n```python\n\
    CommandDef(\"mycommand\", \"Description of what it does\", \"Session\",\n           aliases=(\"mc\",), args_hint=\"[arg]\"\
    ),\n```\n2. Add handler in `HermesCLI.process_command()` in `cli.py`:\n```python\nelif canonical == \"mycommand\":\n \
    \   self._handle_mycommand(cmd_original)\n```\n3. If the command is available in the gateway, add a handler in `gateway/run.py`:\n\
    ```python\nif canonical == \"mycommand\":\n    return await self._handle_mycommand(event)\n```\n4. For persistent settings,\
    \ use `save_config_value()` in `cli.py`\n\n**CommandDef fields:**\n- `name` — canonical name without slash (e.g. `\"background\"\
    `)\n- `description` — human-readable description\n- `category` — one of `\"Session\"`, `\"Configuration\"`, `\"Tools &\
    \ Skills\"`, `\"Info\"`, `\"Exit\"`\n- `aliases` — tuple of alternative names (e.g. `(\"bg\",)`)\n- `args_hint` — argument\
    \ placeholder shown in help (e.g. `\"<prompt>\"`, `\"[name]\"`)\n- `cli_only` — only available in the interactive CLI\n\
    - `gateway_only` — only available in messaging platforms\n- `gateway_config_gate` — config dotpath (e.g. `\"display.tool_progress_command\"\
    `); when set on a `cli_only` command, the command becomes available in the gateway if the config value is truthy. `GATEWAY_KNOWN_COMMANDS`\
    \ always includes config-gated commands so the gateway can dispatch them; help/menus only show them when the gate is open.\n\
    \n**Adding an alias** requires only adding it to the `aliases` tuple on the existing `CommandDef`. No other file changes\
    \ needed — dispatch, help text, Telegram menu, Slack mapping, and autocomplete all update automatically.\n\n---"
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 18
  text: "## Adding Configuration\n\n### config.yaml options:\n1. Add to `DEFAULT_CONFIG` in `hermes_cli/config.py`\n2. Bump\
    \ `_config_version` (check the current value at the top of `DEFAULT_CONFIG`)\n   ONLY if you need to actively migrate/transform\
    \ existing user config\n   (renaming keys, changing structure). Adding a new key to an existing\n   section is handled\
    \ automatically by the deep-merge and does NOT require\n   a version bump."
  enforceability: cross_event
  topic: Configuration & Environment
  expressible: null
- statement_id: 24
  text: "### Skill authoring standards (HARDLINE)\n\nEvery new or modernized skill — bundled, optional, or contributed —\n\
    must meet these standards before merge. Reviewers reject PRs that\nviolate them.\n\n1. **`description` ≤ 60 characters,\
    \ one sentence, ends with a period.**\n   Long descriptions bloat skill listings and dilute the model's\n   attention\
    \ when many skills are loaded. State the capability, not\n   the implementation. No marketing words (\"powerful\",\n \
    \  \"comprehensive\", \"seamless\", \"advanced\"). Don't repeat the skill\n   name. Verify with:\n   ```python\n   import\
    \ re, pathlib\n   m = re.search(r'^description: (.*)$',\n                 pathlib.Path('skills/<cat>/<name>/SKILL.md').read_text(),\n\
    \                 re.MULTILINE)\n   assert len(m.group(1)) <= 60, len(m.group(1))\n   ```"
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 29
  text: "6. **Scripts go in `scripts/`, references in `references/`,\n   templates in `templates/`.** Don't expect the model\
    \ to inline-write\n   parsers, XML walkers, or non-trivial logic every call — ship a\n   helper script. Reference it from\
    \ SKILL.md by path relative to the\n   skill directory."
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 40
  text: "### Rules for profile-safe code\n\n1. **Use `get_hermes_home()` for all HERMES_HOME paths.** Import from `hermes_constants`.\n\
    \   NEVER hardcode `~/.hermes` or `Path.home() / \".hermes\"` in code that reads/writes state.\n   ```python\n   # GOOD\n\
    \   from hermes_constants import get_hermes_home\n   config_path = get_hermes_home() / \"config.yaml\"\n\n   # BAD — breaks\
    \ profiles\n   config_path = Path.home() / \".hermes\" / \"config.yaml\"\n   ```\n\n2. **Use `display_hermes_home()` for\
    \ user-facing messages.** Import from `hermes_constants`.\n   This returns `~/.hermes` for default or `~/.hermes/profiles/<name>`\
    \ for profiles.\n   ```python\n   # GOOD\n   from hermes_constants import display_hermes_home\n   print(f\"Config saved\
    \ to {display_hermes_home()}/config.yaml\")\n\n   # BAD — shows wrong path for profiles\n   print(\"Config saved to ~/.hermes/config.yaml\"\
    )\n   ```\n\n3. **Module-level constants are fine** — they cache `get_hermes_home()` at import time,\n   which is AFTER\
    \ `_apply_profile_override()` sets the env var. Just use `get_hermes_home()`,\n   not `Path.home() / \".hermes\"`.\n\n\
    4. **Tests that mock `Path.home()` must also set `HERMES_HOME`** — since code now uses\n   `get_hermes_home()` (reads\
    \ env var), not `Path.home() / \".hermes\"`:\n   ```python\n   with patch.object(Path, \"home\", return_value=tmp_path),\
    \ \\\n        patch.dict(os.environ, {\"HERMES_HOME\": str(tmp_path / \".hermes\")}):\n       ...\n   ```\n\n5. **Gateway\
    \ platform adapters should use token locks** — if the adapter connects with\n   a unique credential (bot token, API key),\
    \ call `acquire_scoped_lock()` from\n   `gateway.status` in the `connect()`/`start()` method and `release_scoped_lock()`\
    \ in\n   `disconnect()`/`stop()`. This prevents two profiles from using the same credential.\n   See `gateway/platforms/telegram.py`\
    \ for the canonical pattern.\n\n6. **Profile operations are HOME-anchored, not HERMES_HOME-anchored** — `_get_profiles_root()`\n\
    \   returns `Path.home() / \".hermes\" / \"profiles\"`, NOT `get_hermes_home() / \"profiles\"`.\n   This is intentional\
    \ — it lets `hermes -p coder profile list` see all profiles regardless\n   of which one is active."
  enforceability: per_event
  topic: Implementation Details
  expressible: null
- statement_id: 41
  text: '## Known Pitfalls


    ### DO NOT hardcode `~/.hermes` paths

    Use `get_hermes_home()` from `hermes_constants` for code paths. Use `display_hermes_home()`

    for user-facing print/log messages. Hardcoding `~/.hermes` breaks profiles — each profile

    has its own `HERMES_HOME` directory. This was the source of 5 bugs fixed in PR #3575.'
  enforceability: per_event
  topic: Implementation Details
  expressible: null
- statement_id: 42
  text: '### DO NOT introduce new `simple_term_menu` usage

    Existing call sites in `hermes_cli/main.py` remain for legacy fallback only;

    the preferred UI is curses (stdlib) because `simple_term_menu` has

    ghost-duplication rendering bugs in tmux/iTerm2 with arrow keys. New

    interactive menus must use `hermes_cli/curses_ui.py` — see

    `hermes_cli/tools_config.py` for the canonical pattern.'
  enforceability: per_event
  topic: Maintenance
  expressible: null
- statement_id: 47
  text: '### Squash merges from stale branches silently revert recent fixes

    Before squash-merging a PR, ensure the branch is up to date with `main`

    (`git fetch origin main && git reset --hard origin/main` in the worktree,

    then re-apply the PR''s commits). A stale branch''s version of an unrelated

    file will silently overwrite recent fixes on main when squashed. Verify

    with `git diff HEAD~1..HEAD` after merging — unexpected deletions are a

    red flag.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 49
  text: "### Tests must not write to `~/.hermes/`\nThe `_isolate_hermes_home` autouse fixture in `tests/conftest.py` redirects\
    \ `HERMES_HOME` to a temp dir. Never hardcode `~/.hermes/` paths in tests.\n\n**Profile tests**: When testing profile\
    \ features, also mock `Path.home()` so that\n`_get_profiles_root()` and `_get_default_hermes_home()` resolve within the\
    \ temp dir.\nUse the pattern from `tests/hermes_cli/test_profiles.py`:\n```python\n@pytest.fixture\ndef profile_env(tmp_path,\
    \ monkeypatch):\n    home = tmp_path / \".hermes\"\n    home.mkdir()\n    monkeypatch.setattr(Path, \"home\", lambda:\
    \ tmp_path)\n    monkeypatch.setenv(\"HERMES_HOME\", str(home))\n    return home\n```\n\n---"
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 50
  text: '## Testing


    **ALWAYS use `scripts/run_tests.sh`** — do not call `pytest` directly. The script enforces

    hermetic environment parity with CI (unset credential vars, TZ=UTC, LANG=C.UTF-8,

    `-n auto` xdist workers, in-tree subprocess-isolation plugin). Direct `pytest`

    on a 16+ core developer machine with API keys set diverges from CI in ways

    that have caused multiple "works locally, fails in CI" incidents (and the reverse).


    ```bash

    scripts/run_tests.sh                                  # full suite, CI-parity

    scripts/run_tests.sh tests/gateway/                   # one directory

    scripts/run_tests.sh tests/agent/test_foo.py::test_x  # one test

    scripts/run_tests.sh -v --tb=long                     # pass-through pytest flags

    scripts/run_tests.sh --no-isolate tests/foo/          # disable subprocess isolation (faster, for debugging)

    ```'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 53
  text: '### Running without the wrapper (only if you must)


    If you can''t use the wrapper (e.g. inside an IDE that shells pytest directly),

    at minimum activate the venv. The isolation plugin loads automatically from

    `addopts` in `pyproject.toml`, so you get the same per-test process isolation

    either way.


    ```bash

    source .venv/bin/activate   # or: source venv/bin/activate

    python -m pytest tests/ -q

    ```


    If you need to bypass isolation for fast feedback while debugging:


    ```bash

    python -m pytest tests/agent/test_foo.py -q --no-isolate

    ```


    Always run the full suite before pushing changes.'
  enforceability: cross_event
  topic: Testing
  expressible: null
