- statement_id: 17
  text: 'Do not manually edit `hf_models.json`. Regenerate it by running the scraper:


    ```sh

    python3 scripts/scrape_hf_models.py

    ```


    The scraper has hardcoded fallback entries for gated models that require authentication.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 27
  text: '## Adding a new model to the database


    1. Add the model''s HuggingFace repo ID to `TARGET_MODELS` in `scripts/scrape_hf_models.py`.

    2. If the model is gated (requires HF auth), add a fallback entry to the `FALLBACK` dict in the same script.

    3. Run `python3 scripts/scrape_hf_models.py`.

    4. Verify the output in `data/hf_models.json`.

    5. Run `cargo build` to verify compilation.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 28
  text: '## Adding a new filter


    1. Add the filter state to `App` in `tui_app.rs`.

    2. Add filtering logic inside `apply_filters()`.

    3. Add the keybinding in `tui_events.rs` (Normal mode handler).

    4. Add the UI widget in `tui_ui.rs` (`draw_search_and_filters()` function).

    5. Update the status bar help text in `draw_status_bar()`.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 29
  text: '## Adding a new CLI subcommand


    1. Add a variant to the `Commands` enum in `main.rs`.

    2. Add the match arm in the `main()` function''s command dispatch.

    3. Use `display.rs` functions for output, or add new ones as needed.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 31
  text: '## Dependencies policy


    - Prefer crates that are well-maintained and have minimal transitive dependencies.'
  enforceability: per_event
  topic: Maintenance
  expressible: null
- statement_id: 32
  text: '- `sysinfo` is the system detection crate. Do not replace it with raw platform calls.'
  enforceability: per_event
  topic: Maintenance
  expressible: null
- statement_id: 33
  text: '- `ratatui` + `crossterm` is the TUI stack. Do not mix in `termion` or `ncurses`.'
  enforceability: per_event
  topic: Maintenance
  expressible: null
- statement_id: 34
  text: '- `clap` with derive feature for CLI parsing. Do not use manual arg parsing.'
  enforceability: per_event
  topic: Maintenance
  expressible: null
- statement_id: 35
  text: '- The Python scraper uses only stdlib (`urllib`, `json`). Do not add pip dependencies.'
  enforceability: per_event
  topic: Maintenance
  expressible: null
- statement_id: 36
  text: '## Common tasks


    ```sh

    # Build

    cargo build


    # Run TUI

    cargo run


    # Run CLI mode

    cargo run -- --cli


    # Run specific subcommand

    cargo run -- system

    cargo run -- fit --perfect -n 5

    cargo run -- search "llama"


    # Refresh model database

    python3 scripts/scrape_hf_models.py && cargo build


    # Check for compilation issues

    cargo check


    # Format code

    cargo fmt


    # Lint

    cargo clippy

    ```'
  enforceability: per_event
  topic: Build and Run
  expressible: null
