- statement_id: 2
  text: '## Critical commands


    ```bash

    # Quality gate (also runs on commit via pre-commit hooks)

    pre-commit run --all-files


    # Tests

    pytest scripts/tests/ -v


    # EPUB build (calls Kroki.io API to render Mermaid — needs network)

    uv run scripts/build_epub.py


    # Python tooling

    ruff check scripts/ && ruff format scripts/

    mypy scripts/ --ignore-missing-imports

    bandit -c scripts/pyproject.toml -r scripts/ --exclude scripts/tests/

    ```


    Pre-commit runs 5 checks: markdown-lint, cross-references, mermaid-syntax, link-check, build-epub (on `.md` changes).
    All must pass.'
  enforceability: cross_event
  topic: Build and Run
  expressible: null
