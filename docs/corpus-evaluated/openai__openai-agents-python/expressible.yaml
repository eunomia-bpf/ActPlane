- statement_id: 3
  text: '## Policies & Mandatory Rules


    ### Mandatory Skill Usage


    #### `$code-change-verification`


    Run `$code-change-verification` before marking work complete when changes affect runtime code, tests, or build/test behavior.


    Run it when you change:

    - `src/agents/` (library code) or shared utilities.

    - `tests/` or add or modify snapshot tests.

    - `examples/`.

    - Build or test configuration such as `pyproject.toml`, `Makefile`, `mkdocs.yml`, `docs/scripts/`, or CI workflows.


    You can skip `$code-change-verification` for docs-only or repo-meta changes (for example, `docs/`, `.agents/`, `README.md`,
    `AGENTS.md`, `.github/`), unless a user explicitly asks to run the full verification stack.'
  enforceability: cross_event
  topic: AI Integration
  expressible: null
- statement_id: 4
  text: '#### `$openai-knowledge`


    When working on OpenAI API or OpenAI platform integrations in this repo (Responses API, tools, streaming, Realtime API,
    auth, models, rate limits, MCP, Agents SDK or ChatGPT Apps SDK), use `$openai-knowledge` to pull authoritative docs via
    the OpenAI Developer Docs MCP server (and guide setup if it is not configured).'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 11
  text: '- If reordering is unavoidable, add an explicit compatibility layer and regression tests that exercise the old positional
    call pattern.'
  enforceability: cross_event
  topic: Architecture
  expressible: null
- statement_id: 13
  text: '### Platform, Docs, and Security Review


    - Documentation is published to the live site, so coordinate SDK behavior changes and docs carefully. If docs describe
    behavior that is not released yet, either delay the docs change until the SDK release is available or split it into a
    follow-up PR.'
  enforceability: cross_event
  topic: Documentation
  expressible: null
- statement_id: 23
  text: '- Keep streaming and non-streaming paths behaviorally aligned. Changes to `run_internal/run_loop.py` (`run_single_turn`,
    `run_single_turn_streamed`, `get_new_response`, `start_streaming`) should be mirrored, and any new streaming item types
    must be reflected in `src/agents/stream_events.py`.'
  enforceability: cross_event
  topic: Implementation Details
  expressible: null
- statement_id: 26
  text: "- Adding new tool/output/approval item types requires coordinated updates across:\n  - `src/agents/items.py` (RunItem\
    \ types and conversions)\n  - `src/agents/run_internal/run_steps.py` (ProcessedResponse and tool run structs)\n  - `src/agents/run_internal/turn_resolution.py`\
    \ (model output processing, run item extraction)\n  - `src/agents/run_internal/tool_execution.py` and `src/agents/run_internal/tool_planning.py`\n\
    \  - `src/agents/run_internal/items.py` (normalization, dedupe, approval filtering)\n  - `src/agents/stream_events.py`\
    \ (stream event names)\n  - `src/agents/run_state.py` (RunState serialization/deserialization)\n  - `src/agents/run_internal/session_persistence.py`\
    \ (session save/rewind)"
  enforceability: cross_event
  topic: Architecture
  expressible: null
- statement_id: 27
  text: '- If the serialized RunState shape changes, update `CURRENT_SCHEMA_VERSION` in `src/agents/run_state.py` and the
    related serialization/deserialization logic. Keep released schema versions readable, and feel free to renumber or squash
    unreleased schema versions before release when those intermediate snapshots are intentionally unsupported.'
  enforceability: cross_event
  topic: Implementation Details
  expressible: null
- statement_id: 28
  text: '- When bumping `CURRENT_SCHEMA_VERSION`, also add or update the matching entry in `SCHEMA_VERSION_SUMMARIES` in `src/agents/run_state.py`
    so every supported version keeps a short historical note describing what changed in that schema.'
  enforceability: cross_event
  topic: Implementation Details
  expressible: null
- statement_id: 30
  text: "### Development Workflow\n\n1. Sync with `main` and create a feature branch:\n   ```bash\n   git checkout -b feat/<short-description>\n\
    \   ```\n2. If dependencies changed or you are setting up the repo, run `make sync`.\n3. Implement changes and add or\
    \ update tests alongside code updates.\n4. Highlight compatibility or API risks in your plan before implementing changes\
    \ that alter the latest released behavior or a released or explicitly supported durable external state boundary.\n5. Build\
    \ docs when you touch documentation:\n   ```bash\n   make build-docs\n   ```\n6. When `$code-change-verification` applies,\
    \ run it to execute the full verification stack before marking work complete.\n7. Commit with concise, imperative messages;\
    \ keep commits small and focused, then open a pull request.\n8. When reporting code changes as complete (after substantial\
    \ code work), invoke `$pr-draft-summary` as the final handoff step unless the task falls under the documented skip cases."
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 31
  text: '### Testing & Automated Checks


    Before submitting changes, ensure relevant checks pass and extend tests when you touch code.


    When `$code-change-verification` applies, run it to execute the required verification stack from the repository root.
    Rerun the full stack after applying fixes.'
  enforceability: cross_event
  topic: Testing
  expressible: null
- statement_id: 36
  text: '- Type hints must pass `make typecheck`.'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 39
  text: '#### Mandatory local run order


    When `$code-change-verification` applies, run the full sequence in order (or use the skill scripts):


    ```bash

    make format

    make lint

    make typecheck

    make tests

    ```'
  enforceability: cross_event
  topic: Testing
  expressible: null
