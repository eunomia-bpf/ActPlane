- statement_id: 32
  text: '### Quick Start


    **Check for ready work:**


    ```bash

    bd ready --json

    ```'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 33
  text: '**Create new issues:**


    ```bash

    bd create "Issue title" --description="Detailed context" -t bug|feature|task -p 0-4 --json

    bd create "Issue title" --description="What this issue is about" -p 1 --deps discovered-from:bd-123 --json


    # Use stdin for descriptions with special characters (backticks, !, nested quotes)

    echo ''Description with `backticks` and "quotes"'' | bd create "Title" --description=- --json

    ```'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 34
  text: '**Claim and update:**


    ```bash

    bd update <id> --claim --json

    bd update bd-42 --priority 1 --json

    ```'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 35
  text: '**Complete work:**


    ```bash

    bd close bd-42 --reason "Completed" --json

    ```'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 38
  text: "### Workflow for AI Agents\n\n1. **Check ready work**: `bd ready` shows unblocked issues\n2. **Read execution metadata\
    \ first**: before deciding local vs delegated work, model, or reasoning level, inspect structured metadata:\n   ```bash\n\
    \   bd show <id> --json | jq '.[0] | {id,title,metadata,description,notes}'\n   ```\n   The execution metadata keys `execution_agent_type`,\
    \ `execution_suggested_model`, `execution_reasoning_effort`, `execution_mode`, and `execution_parallel_group` are authoritative\
    \ hints when present. Use description and notes as fallback context.\n3. **Claim your task atomically**: `bd update <id>\
    \ --claim`\n4. **Work on it**: Implement, test, document\n5. **Discover new work?** Create linked issue:\n   - `bd create\
    \ \"Found bug\" --description=\"Details about what was found\" -p 1 --deps discovered-from:<parent-id>`\n6. **Complete**:\
    \ `bd close <id> --reason \"Done\"`"
  enforceability: cross_event
  topic: AI Integration
  expressible: null
