- statement_id: 25
  text: "## Landing the Plane (Session Completion)\n\n**When ending a work session**, you MUST complete ALL steps below. Work\
    \ is NOT complete until `git push` succeeds.\n\n**MANDATORY WORKFLOW:**\n\n1. **File issues for remaining work** - Create\
    \ issues for anything that needs follow-up\n2. **Run quality gates** (if code changed) - Tests, linters, builds\n3. **Update\
    \ issue status** - Close finished work, update in-progress items\n4. **PUSH TO REMOTE** - This is MANDATORY:\n   ```bash\n\
    \   git pull --rebase\n   git push\n   git status  # MUST show \"up to date with origin\"\n   ```\n5. **Clean up** - Clear\
    \ stashes, prune remote branches\n6. **Verify** - All changes committed AND pushed\n7. **Hand off** - Provide context\
    \ for next session"
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 26
  text: '**CRITICAL RULES:**

    - Work is NOT complete until `git push` succeeds'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 27
  text: '- NEVER stop before pushing - that leaves work stranded locally'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 29
  text: '- If push fails, resolve and retry until it succeeds'
  enforceability: per_event
