- statement_id: 2
  text: "## Install (5 min)\n\n1. Install gbrain via Bun (the canonical path):\n   ```bash\n   curl -fsSL https://bun.sh/install\
    \ | bash\n   export PATH=\"$HOME/.bun/bin:$PATH\"\n   bun install -g github:garrytan/gbrain\n   ```\n   If `bun install\
    \ -g` aborts or `gbrain doctor` reports `schema_version: 0`,\n   the CLI prints a recovery hint pointing at [#218](https://github.com/garrytan/gbrain/issues/218).\n\
    \   Run `gbrain apply-migrations --yes` to recover, or fall back to the\n   deterministic install: `git clone https://github.com/garrytan/gbrain.git\
    \ ~/gbrain && cd ~/gbrain && bun install && bun link`.\n2. Init the brain: `gbrain init` (defaults to PGLite, zero-config).\
    \ For 1000+ files or\n   multi-machine sync, init suggests Postgres + pgvector via Supabase.\n3. **STOP — ask the user\
    \ about search mode.** `gbrain init` auto-applied a\n   default but printed a 9-cell cost matrix (mode × downstream model)\n\
    \   preceded by `[AGENT]` markers. You MUST relay the matrix to the operator\n   and confirm their choice before continuing.\
    \ Cost spread between corners\n   is 25x — silent acceptance is the wrong default. See\n   [`./INSTALL_FOR_AGENTS.md`](./INSTALL_FOR_AGENTS.md)\
    \ Step 3.5 for the\n   exact ask-the-user protocol. Same banner fires on `gbrain post-upgrade`\n   for existing users\
    \ (search modes were added in v0.32.3).\n4. Read [`./INSTALL_FOR_AGENTS.md`](./INSTALL_FOR_AGENTS.md) for the full 9-step\
    \ flow\n   (API keys, identity, cron, verification)."
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 12
  text: '## Before shipping


    Easiest path: `bun run ci:local` runs the full CI gate inside Docker (gitleaks,

    unit tests with `DATABASE_URL` unset, then all 29 E2E files sequentially against a

    fresh pgvector container) and tears down. Use `bun run ci:local:diff` for the

    diff-aware subset during fast iteration on a focused branch. Requires Docker

    (Docker Desktop / OrbStack / Colima) and `gitleaks` (`brew install gitleaks`).


    Manual path: `bun test` plus the E2E lifecycle described in `./CLAUDE.md` (spin

    up the test Postgres container, run `bun run test:e2e`, tear it down).


    Ship via the `/ship` skill, not by hand.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 13
  text: '## Privacy


    Never commit real names of people, companies, or funds into public artifacts. See the

    Privacy rule in `./CLAUDE.md`. GBrain pages reference real contacts; public docs must

    use generic placeholders (`alice-example`, `acme-example`, `fund-a`).'
  enforceability: per_event
  topic: Security
  expressible: null
- statement_id: 14
  text: '## Forks


    If you are a fork, regenerate `llms.txt` + `llms-full.txt` with your own URL base before

    publishing: `LLMS_REPO_BASE=https://raw.githubusercontent.com/your-org/your-fork/main bun run build:llms`.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
