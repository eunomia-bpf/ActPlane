- statement_id: 2
  text: '## Think in Code — MANDATORY


    Analyze/count/filter/compare/search/parse/transform data: **write code** via `ctx_execute(language, code)`, `console.log()`
    only the answer. Do NOT read raw data into context. PROGRAM the analysis, not COMPUTE it. Pure JavaScript — Node.js built-ins
    only (`fs`, `path`, `child_process`). `try/catch`, handle `null`/`undefined`. One script replaces ten tool calls.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 3
  text: '## BLOCKED — do NOT attempt


    ### curl / wget — BLOCKED

    Intercepted and replaced with error. Do NOT retry.

    Use: `ctx_fetch_and_index(url, source)` or `ctx_execute(language: "javascript", code: "const r = await fetch(...)")`'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 4
  text: '### Inline HTTP — BLOCKED

    `fetch(''http`, `requests.get(`, `requests.post(`, `http.get(`, `http.request(` — intercepted. Do NOT retry.

    Use: `ctx_execute(language, code)` — only stdout enters context'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 5
  text: '### WebFetch — BLOCKED

    Use: `ctx_fetch_and_index(url, source)` then `ctx_search(queries)`'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 6
  text: '## REDIRECTED — use sandbox


    ### Bash (>20 lines output)

    Bash ONLY for: `git`, `mkdir`, `rm`, `mv`, `cd`, `ls`, `npm install`, `pip install`.

    Otherwise: `ctx_batch_execute(commands, queries)` or `ctx_execute(language: "shell", code: "...")`'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 7
  text: '### Read (for analysis)

    Reading to **Edit** → Read correct. Reading to **analyze/explore/summarize** → `ctx_execute_file(path, language, code)`.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 8
  text: '### Grep — may flood context

    Use `ctx_execute(language: "shell", code: "grep ...")` in sandbox.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 9
  text: '## Tool selection


    0. **MEMORY**: `ctx_search(sort: "timeline")` — after resume, check prior context before asking user.

    1. **GATHER**: `ctx_batch_execute(commands, queries)` — runs all commands, auto-indexes, returns search. ONE call replaces
    30+. Each command: `{label: "header", command: "..."}`.

    2. **FOLLOW-UP**: `ctx_search(queries: ["q1", "q2", ...])` — all questions as array, ONE call (default relevance mode).

    3. **PROCESSING**: `ctx_execute(language, code)` | `ctx_execute_file(path, language, code)` — sandbox, only stdout enters
    context.

    4. **WEB**: `ctx_fetch_and_index(url, source)` then `ctx_search(queries)` — raw HTML never enters context.

    5. **INDEX**: `ctx_index(content, source)` — store in FTS5 for later search.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 10
  text: '## Parallel I/O batches


    For multi-URL fetches or multi-API calls, **always** include `concurrency: N` (1-8):


    - `ctx_batch_execute(commands: [3+ network commands], concurrency: 5)` — gh, curl, dig, docker inspect, multi-region cloud
    queries

    - `ctx_fetch_and_index(requests: [{url, source}, ...], concurrency: 5)` — multi-URL batch fetch


    **Use concurrency 4-8** for I/O-bound work (network calls, API queries). **Keep concurrency 1** for CPU-bound (npm test,
    build, lint) or commands sharing state (ports, lock files, same-repo writes).


    GitHub API rate-limit: cap at 4 for `gh` calls.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 12
  text: '## Output


    Write artifacts to FILES — never inline. Return: file path + 1-line description.

    Descriptive source labels for `ctx_search(source: "label")`.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 14
  text: '## Memory


    Session history is persistent and searchable. On resume, search BEFORE asking the user:


    | Need | Command |

    |------|---------|

    | What were we working on? | `ctx_search(queries: ["summary"], source: "compaction", sort: "timeline")` |

    | What was the first request? | `ctx_search(queries: ["prompt"], source: "user-prompt", sort: "timeline")` |

    | What did we decide? | `ctx_search(queries: ["decision"], source: "decision", sort: "timeline")` |

    | What NOT to repeat? | `ctx_search(queries: ["rejected"], source: "rejected-approach")` |

    | What constraints exist? | `ctx_search(queries: ["constraint"], source: "constraint")` |'
  enforceability: cross_event
  topic: AI Integration
  expressible: null
