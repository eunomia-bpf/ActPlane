- statement_id: 2
  text: '## Quick Reference


    ```bash

    bd ready              # Find available work

    bd show <id>          # View issue details

    bd update <id> --claim  # Claim work atomically

    bd close <id>         # Complete work

    bd dolt push          # Push beads data to remote

    ```'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 3
  text: '## Non-Interactive Shell Commands


    **ALWAYS use non-interactive flags** with file operations to avoid hanging on confirmation prompts.


    Shell commands like `cp`, `mv`, and `rm` may be aliased to include `-i` (interactive) mode on some systems, causing the
    agent to hang indefinitely waiting for y/n input.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 4
  text: '**Use these forms instead:**

    ```bash

    # Force overwrite without prompting

    cp -f source dest           # NOT: cp source dest

    mv -f source dest           # NOT: mv source dest

    rm -f file                  # NOT: rm file


    # For recursive operations

    rm -rf directory            # NOT: rm -r directory

    cp -rf source dest          # NOT: cp -r source dest

    ```'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 5
  text: '**Other commands that may prompt:**

    - `scp` - use `-o BatchMode=yes` for non-interactive'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 6
  text: '- `ssh` - use `-o BatchMode=yes` to fail instead of prompting'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 7
  text: '- `apt-get` - use `-y` flag'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 8
  text: '- `brew` - use `HOMEBREW_NO_AUTO_UPDATE=1` env var'
  enforceability: per_event
  topic: Development Process
  expressible: null
