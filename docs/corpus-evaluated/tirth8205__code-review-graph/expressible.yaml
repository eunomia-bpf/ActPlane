- statement_id: 14
  text: "## Session Completion\n\n**When ending a work session**, you MUST complete ALL steps below. Work is NOT complete\
    \ until `git push` succeeds.\n\n**MANDATORY WORKFLOW:**\n\n1. **File issues for remaining work** - Create issues for anything\
    \ that needs follow-up\n2. **Run quality gates** (if code changed) - Tests, linters, builds\n3. **Update issue status**\
    \ - Close finished work, update in-progress items\n4. **PUSH TO REMOTE** - This is MANDATORY:\n   ```bash\n   git pull\
    \ --rebase\n   bd dolt push\n   git push\n   git status  # MUST show \"up to date with origin\"\n   ```\n5. **Clean up**\
    \ - Clear stashes, prune remote branches\n6. **Verify** - All changes committed AND pushed\n7. **Hand off** - Provide\
    \ context for next session"
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 15
  text: '**CRITICAL RULES:**

    - Work is NOT complete until `git push` succeeds'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 16
  text: '- NEVER stop before pushing - that leaves work stranded locally'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 18
  text: '- If push fails, resolve and retry until it succeeds

    <!-- END BEADS INTEGRATION -->'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 19
  text: '<!-- code-review-graph MCP tools -->

    ## MCP Tools: code-review-graph


    **IMPORTANT: This project has a knowledge graph. ALWAYS use the

    code-review-graph MCP tools BEFORE using Grep/Glob/Read to explore

    the codebase.** The graph is faster, cheaper (fewer tokens), and gives

    you structural context (callers, dependents, test coverage) that file

    scanning cannot.'
  enforceability: cross_event
  topic: AI Integration
  expressible: null
- statement_id: 20
  text: '### When to use graph tools FIRST


    - **Exploring code**: `semantic_search_nodes` or `query_graph` instead of Grep'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 21
  text: '- **Understanding impact**: `get_impact_radius` instead of manually tracing imports'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 22
  text: '- **Code review**: `detect_changes` + `get_review_context` instead of reading entire files'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 23
  text: '- **Finding relationships**: `query_graph` with callers_of/callees_of/imports_of/tests_for'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 24
  text: '- **Architecture questions**: `get_architecture_overview` + `list_communities`'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 27
  text: '### Workflow


    1. The graph auto-updates on file changes (via hooks).

    2. Use `detect_changes` for code review.

    3. Use `get_affected_flows` to understand impact.

    4. Use `query_graph` pattern="tests_for" to check coverage.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
