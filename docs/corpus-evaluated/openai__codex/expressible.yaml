- statement_id: 4
  text: '- Install any commands the repo relies on (for example `just`, `rg`, or `cargo-insta`) if they aren''t already available
    before running instructions here.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 15
  text: '- Do not add general product or user-facing documentation to the `docs/` folder. The official Codex documentation
    lives elsewhere. The exception is app-server API documentation, which is covered by the app-server guidance below.'
  enforceability: per_event
  topic: Documentation
  expressible: null
- statement_id: 17
  text: '- If you change `ConfigToml` or nested config types, run `just write-config-schema` to update `codex-rs/core/config.schema.json`.'
  enforceability: cross_event
  topic: Build and Run
  expressible: null
- statement_id: 20
  text: "- If you change Rust dependencies (`Cargo.toml` or `Cargo.lock`), run `just bazel-lock-update` from the\n  repo root\
    \ to refresh `MODULE.bazel.lock`, and include that lockfile update in the same change."
  enforceability: cross_event
  topic: Build and Run
  expressible: null
- statement_id: 21
  text: "- After dependency changes, run `just bazel-lock-check` from the repo root so lockfile drift is caught\n  locally\
    \ before CI."
  enforceability: cross_event
  topic: Build and Run
  expressible: null
- statement_id: 25
  text: '- When running Rust commands (e.g. `just fix` or `just test`) be patient with the command and never try to kill them
    using the PID. Rust lock can make the execution slow, this is expected.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 26
  text: 'Run `just fmt` (in `codex-rs` directory) automatically after you have finished making Rust code changes; do not ask
    for approval to run it. Additionally, run the tests:


    1. Do not run `cargo test` directly. Use `just test` so test execution follows the repo defaults.

    2. Run the test for the specific project that was changed. For example, if changes were made in `codex-rs/tui`, run `just
    test -p codex-tui`.

    3. Once those pass, if any changes were made in common, core, or protocol, run the complete test suite with `just test`.
    Avoid `--all-features` for routine local runs because it expands the build matrix and can significantly increase `target/`
    disk usage; use it only when you specifically need full feature coverage. project-specific or individual tests can be
    run without asking the user, but do ask the user before running the complete test suite.


    Before finalizing a large change to `codex-rs`, run `just fix -p <project>` (in `codex-rs` directory) to fix any linter
    issues in the code. Prefer scoping with `-p` to avoid slow workspace‑wide Clippy builds; only run `just fix` without `-p`
    if you changed shared crates. Do not re-run tests after running `fix` or `fmt`.'
  enforceability: cross_event
  topic: Build and Run
  expressible: null
- statement_id: 47
  text: "When UI or text output changes intentionally, update the snapshots as follows:\n\n- Run tests to generate any updated\
    \ snapshots:\n  - `just test -p codex-tui`\n- Check what’s pending:\n  - `cargo insta pending-snapshots -p codex-tui`\n\
    - Review changes by reading the generated `*.snap.new` files directly in the repo, or preview a specific file:\n  - `cargo\
    \ insta show -p codex-tui path/to/file.snap.new`\n- Only if you intend to accept all new snapshots in this crate, run:\n\
    \  - `cargo insta accept -p codex-tui`"
  enforceability: cross_event
  topic: Testing
  expressible: null
- statement_id: 48
  text: 'If you don’t have the tool:


    - `cargo install --locked cargo-insta`'
  enforceability: per_event
  topic: Build and Run
  expressible: null
