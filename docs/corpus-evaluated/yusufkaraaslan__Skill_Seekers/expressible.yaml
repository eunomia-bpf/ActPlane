- statement_id: 57
  text: '## Pre-commit Checklist


    ```bash

    ruff check src/ tests/

    ruff format --check src/ tests/

    pytest tests/ -v -x   # stop on first failure

    ```'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 58
  text: 'Never commit API keys. Use env vars: `ANTHROPIC_API_KEY`, `GOOGLE_API_KEY`, `OPENAI_API_KEY`, `GITHUB_TOKEN`.'
  enforceability: per_event
  topic: Security
  expressible: null
- statement_id: 68
  text: '## Security Considerations


    - **API Keys:** Never commit API keys to version control. Use environment variables or `.env` files (already in `.gitignore`)'
  enforceability: per_event
  topic: Security
  expressible: null
