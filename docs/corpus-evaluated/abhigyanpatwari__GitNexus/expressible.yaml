- statement_id: 2
  text: '## Scope


    | Boundary | Rule |

    |----------|------|

    | **Reads** | `gitnexus/`, `gitnexus-web/`, `eval/`, plugin packages, `.github/`, `.gitnexus/`, docs. |

    | **Writes** | Only paths required for the change; keep diffs minimal. Update lockfiles when deps change. |

    | **Executes** | `npm`, `npx`, `node` under `gitnexus/` and `gitnexus-web/`; `uv run` for Python under `eval/`; documented
    CI/dev workflows. |

    | **Off-limits** | Real `.env` / secrets, production credentials, unrelated repos, destructive git ops without confirmation.
    |'
  enforceability: per_event
  topic: Configuration & Environment
  expressible: null
- statement_id: 14
  text: '## Always Do


    - **MUST run impact analysis before editing any symbol.** Before modifying a function, class, or method, run `gitnexus_impact({target:
    "symbolName", direction: "upstream"})` and report the blast radius (direct callers, affected processes, risk level) to
    the user.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 15
  text: '- **MUST run `gitnexus_detect_changes()` before committing** to verify your changes only affect expected symbols
    and execution flows.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 17
  text: '- When exploring unfamiliar code, use `gitnexus_query({query: "concept"})` to find execution flows instead of grepping.
    It returns process-grouped results ranked by relevance.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 18
  text: '- When you need full context on a specific symbol — callers, callees, which execution flows it participates in —
    use `gitnexus_context({name: "symbolName"})`.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 19
  text: '## Never Do


    - NEVER edit a function, class, or method without first running `gitnexus_impact` on it.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 21
  text: '- NEVER rename symbols with find-and-replace — use `gitnexus_rename` which understands the call graph.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 22
  text: '- NEVER commit changes without running `gitnexus_detect_changes()` to check affected scope.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
