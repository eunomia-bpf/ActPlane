- statement_id: 2
  text: '## Skill Routing


    Use these skills before working in this repository:


    - `ccusage-development` - monorepo layout, bundled CLI packaging, commands, code style, dependency policy, and post-change
    checks.

    - `ccusage-rust` - native Rust CLI implementation, parser/module layout, pricing embedding, and TypeScript parity checks.

    - `ccusage-rust-profile` - native Rust CLI profiling, branch-vs-main speed comparisons, profile reading, and optimization
    validation.

    - `ccusage-testing` - Rust cargo tests, CLI snapshots, Claude model names, and LiteLLM pricing test rules.

    - `ccusage-typescript` - TypeScript package/tooling work, Vitest tests, Bun scripts, package launchers, schema tooling,
    and benchmark scripts.

    - `fs-fixture` - disposable filesystem trees for tests with `createFixture()` and local README lookup.

    - `ccusage-agent-sources` - agent adapter log locations, token mappings, cost rules, and CLI behavior.

    - `ccusage-docs` - VitePress docs structure, screenshot placement, accessibility, and markdown linting conventions.

    - `skill-creator` - repo-local skill creation, SKILL.md frontmatter, description trigger quality, and reference layout.

    - `typescript-style` - required before reading or editing `.ts`, `.tsx`, `.js`, or `.jsx`; covers typing, `satisfies`,
    safe suppressions, and library-specific guidance for arkregex, byethrow, and Gunshi.

    - `ast-grep` - structural code searches in Rust or TypeScript and AST-based migration verification with the dev-shell
    `ast-grep` CLI.

    - `bun-api-reference` - local Bun runtime API docs and type references under `node_modules/bun-types`.

    - `tdd` - Red-Green-Refactor workflow for logic changes.

    - `bun-cpu-profile` - Bun/TypeScript profiling for package scripts; use `ccusage-rust-profile` for native CLI performance
    work.

    - `reduce-similarities` - AST-based duplicate Rust code detection with similarity-rs; TypeScript duplication checks use
    `ccusage-typescript` and `ast-grep`.

    - `cmux-debug` - terminal UI and responsive table verification in cmux.

    - `create-pr` - single entry point for PR work, from branch creation through AI review requests, review-thread replies,
    and passing CI.

    - `fix-ci` - diagnose and fix failing GitHub Actions checks with `gh`, then push small follow-up commits.'
  enforceability: cross_event
  topic: AI Integration
  expressible: null
- statement_id: 5
  text: '- Standalone agent wrapper packages have been removed. Do not add docs, tests, or features that promote `ccusage-amp`,
    `ccusage-codex`, `ccusage-opencode`, or `ccusage-pi`.'
  enforceability: per_event
  topic: Maintenance
