- statement_id: 7
  text: '- Prefer tools provided by the Nix dev shell before falling back to ad hoc installs: `rg`, `fd`, `fzf`, `delta`,
    `dust`, `jq`, `gh`, `hyperfine`, `similarity`, `ast-grep`, `typos`, and `typos-lsp`. When a missing tool would be useful
    for repeated agent work in this repository, add it to `flake.nix`.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 12
  text: '- After code changes, run `pnpm run format`, `pnpm typecheck`, and `pnpm run test`.'
