- statement_id: 1
  text: '# cmux agent notes


    ## Initial setup


    Run the setup script to initialize submodules and build GhosttyKit:


    ```bash

    ./scripts/setup.sh

    ```'
  enforceability: per_event
  topic: Configuration & Environment
  expressible: null
- statement_id: 2
  text: '## Local dev


    After making code changes, always run the reload script with a tag to build the Debug app:


    ```bash

    ./scripts/reload.sh --tag fix-zsh-autosuggestions

    ```'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 4
  text: "`reload.sh` prints an `App path:` line with the absolute path to the built `.app`. Use that path to build a cmd-clickable\
    \ `file://` URL. Steps:\n\n1. Grab the path from the `App path:` line in `reload.sh` output.\n2. Prepend `file://` and\
    \ URL-encode spaces as `%20`. Do not hardcode any part of the path.\n3. Format it as a markdown link using the template\
    \ for your agent type.\n\nExample. If `reload.sh` output contains:\n```\nApp path:\n  /Users/someone/Library/Developer/Xcode/DerivedData/cmux-my-tag/Build/Products/Debug/cmux\
    \ DEV my-tag.app\n```\n\n**Claude Code** outputs:\n```markdown\n=======================================================\n\
    [cmux DEV my-tag.app](file:///Users/someone/Library/Developer/Xcode/DerivedData/cmux-my-tag/Build/Products/Debug/cmux%20DEV%20my-tag.app)\n\
    =======================================================\n```\n\n**Codex** outputs:\n```\n=======================================================\n\
    [my-tag: file:///Users/someone/Library/Developer/Xcode/DerivedData/cmux-my-tag/Build/Products/Debug/cmux%20DEV%20my-tag.app](file:///Users/someone/Library/Developer/Xcode/DerivedData/cmux-my-tag/Build/Products/Debug/cmux%20DEV%20my-tag.app)\n\
    =======================================================\n```"
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 5
  text: Never use `/tmp/cmux-<tag>/...` app links in chat output.
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 6
  text: 'For CLI or socket dogfood against a tagged Debug app, use the tag-bound helper and set `CMUX_TAG`.

    Do not use `/tmp/cmux-cli` for tagged dogfood, since that symlink points at the most recently

    reloaded build and can target the user''s main app socket.


    ```bash

    CMUX_TAG=<tag> scripts/cmux-debug-cli.sh list-workspaces

    CMUX_TAG=<tag> scripts/cmux-debug-cli.sh send --workspace workspace:1 --surface surface:1 "echo ok"

    ```


    The helper refuses to run without `CMUX_TAG`, targets `/tmp/cmux-debug-<tag>.sock`, and uses the

    matching tagged CLI from `~/Library/Developer/Xcode/DerivedData/cmux-<tag>/...`. It also scrubs

    ambient cmux terminal context (`CMUX_SOCKET`, `CMUX_SOCKET_PASSWORD`, workspace/surface/tab/panel

    IDs, cmuxd socket, and debug log), then sets `CMUX_SOCKET_PATH`, `CMUX_BUNDLE_ID`, and

    `CMUX_BUNDLED_CLI_PATH` for the selected tag.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 7
  text: 'After making code changes, always use `reload.sh --tag` to build. **Never run bare `xcodebuild` or `open` an untagged
    `cmux DEV.app`.** Untagged builds share the default debug socket and bundle ID with other agents, causing conflicts and
    stealing focus.


    ```bash

    ./scripts/reload.sh --tag <your-branch-slug>

    ```'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 8
  text: 'If you only need to verify the build compiles (no launch), use a tagged derivedDataPath:


    ```bash

    xcodebuild -project cmux.xcodeproj -scheme cmux -configuration Debug -destination ''platform=macOS'' -derivedDataPath
    /tmp/cmux-<your-tag> build

    ```'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 9
  text: 'When rebuilding GhosttyKit.xcframework, always use Release optimizations:


    ```bash

    cd ghostty && zig build -Demit-xcframework=true -Dxcframework-target=universal -Doptimize=ReleaseFast

    ```'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 10
  text: 'When rebuilding cmuxd for release/bundling, always use ReleaseFast:


    ```bash

    cd cmuxd && zig build -Doptimize=ReleaseFast

    ```'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 16
  text: Before launching a new tagged run, clean up any older tags you started in this session (quit old tagged app + remove
    its `/tmp` socket/derived data).
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 21
  text: 'Cloud VM backend logic must stay in Vercel route handlers and Effect services backed by Postgres.

    Do not reintroduce Rivet or a raw actor protocol for this feature unless a later architecture doc

    explicitly changes the control plane.'
  enforceability: per_event
  topic: Architecture
  expressible: null
- statement_id: 38
  text: '## Regression test commit policy


    When adding a regression test for a bug fix, use a two-commit structure so CI proves the test catches the bug:


    1. **Commit 1:** Add the failing test only (no fix). CI should go red.

    2. **Commit 2:** Add the fix. CI should go green.


    This makes it visible in the GitHub PR UI (Commits tab, check statuses) that the test genuinely fails without the fix.'
  enforceability: cross_event
  topic: Testing
  expressible: null
- statement_id: 40
  text: '- When a behavior is exposed through multiple entrypoints (keyboard shortcut, command palette, context menu, CLI,
    settings, debug menu), implement one shared action/model path and verify every entrypoint that should invoke it. Do not
    patch one surface while leaving the others with duplicated logic.'
  enforceability: cross_event
  topic: Implementation Details
  expressible: null
- statement_id: 42
  text: '- When a user says tests missed a bug, add or adjust behavior-level coverage around the exact repro path before claiming
    the fix is complete.'
  enforceability: cross_event
  topic: Testing
  expressible: null
- statement_id: 49
  text: '- Do not add an app-level display link or manual `ghostty_surface_draw` loop; rely on Ghostty wakeups/renderer to
    avoid typing lag.'
  enforceability: per_event
  topic: Implementation Details
  expressible: null
- statement_id: 55
  text: '- **Submodule safety:** When modifying a submodule (ghostty, vendor/bonsplit, etc.), always push the submodule commit
    to its remote `main` branch BEFORE committing the updated pointer in the parent repo. Never commit on a detached HEAD
    or temporary branch â€” the commit will be orphaned and lost. Verify with: `cd <submodule> && git merge-base --is-ancestor
    HEAD origin/main`.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 57
  text: '- **Shortcut policy:** Every new cmux-owned keyboard shortcut must be added to `KeyboardShortcutSettings`, visible/editable
    in Settings, supported in `~/.config/cmux/cmux.json`, and documented in the keyboard shortcut and configuration docs.'
  enforceability: cross_event
  topic: Implementation Details
  expressible: null
- statement_id: 61
  text: '- **Test files in `cmuxTests/` must be wired into `cmux.xcodeproj/project.pbxproj`.** A `.swift` file added to the
    worktree without a matching `PBXFileReference` + `PBXSourcesBuildPhase` entry is silently ignored by Xcode and never compiles
    or runs on CI. Both `xcodebuild test -only-testing:cmuxTests/<TestClass>` and bot reviews pass with "Executed 0 tests"
    â€” so the missing wiring is indistinguishable from a clean two-commit red/green regression test until a real user hits
    the bug. The `workflow-guard-tests` job runs `./scripts/lint-pbxproj-test-wiring.sh` to catch this at PR time; surfaced
    during the https://github.com/manaflow-ai/cmux/issues/4529 investigation against https://github.com/manaflow-ai/cmux/pull/4536.
    Add via Xcode (drag the file into the cmuxTests target) or hand-edit the four pbxproj entries; reference any wired sibling
    like `TabManagerUnitTests.swift` as a template.'
  enforceability: cross_event
  topic: Testing
  expressible: null
- statement_id: 73
  text: '## Socket focus policy


    - Socket/CLI commands must not steal macOS app focus (no app activation/window raising side effects).'
  enforceability: per_event
  topic: Implementation Details
  expressible: null
- statement_id: 74
  text: '- Only explicit focus-intent commands may mutate in-app focus/selection (`window.focus`, `workspace.select/next/previous/last`,
    `surface.focus`, `pane.focus/last`, browser focus commands, and v1 focus equivalents).'
  enforceability: per_event
  topic: Implementation Details
  expressible: null
- statement_id: 76
  text: '## Testing policy


    **Never run tests locally.** All tests (E2E, UI, python socket tests) run via GitHub Actions or on the VM.'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 77
  text: '- **E2E / UI tests:** trigger via `gh workflow run test-e2e.yml` (see cmuxterm-hq CLAUDE.md for details)'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 78
  text: '- **Unit tests:** `xcodebuild -scheme cmux-unit` is safe (no app launch), but prefer CI'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 79
  text: '- **Python socket tests (tests_v2/):** these connect to a running cmux instance''s socket. Never launch an untagged
    `cmux DEV.app` to run them. If you must test locally, use a tagged build''s socket (`/tmp/cmux-debug-<tag>.sock`) with
    `CMUX_SOCKET_PATH=/tmp/cmux-debug-<tag>.sock`'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 80
  text: '- **Never `open` an untagged `cmux DEV.app`** from DerivedData. It conflicts with the user''s running debug instance.'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 81
  text: '## Ghostty submodule workflow


    Ghostty changes must be committed in the `ghostty` submodule and pushed to the `manaflow-ai/ghostty` fork.

    Keep `docs/ghostty-fork.md` up to date with any fork changes and conflict notes.


    ```bash

    cd ghostty

    git remote -v  # origin = upstream, manaflow = fork

    git checkout -b <branch>

    git add <files>

    git commit -m "..."

    git push manaflow <branch>

    ```


    To keep the fork up to date with upstream:


    ```bash

    cd ghostty

    git fetch origin

    git checkout main

    git merge origin/main

    git push manaflow main

    ```


    Then update the parent repo with the new submodule SHA:


    ```bash

    cd ..

    git add ghostty

    git commit -m "Update ghostty submodule"

    ```'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 82
  text: '## Release


    Use the `/release` command to prepare a new release. This will:

    1. Determine the new version (bumps minor by default)

    2. Gather commits since the last tag and update the changelog

    3. Update `CHANGELOG.md` (the docs changelog page at `web/app/docs/changelog/page.tsx` reads from it)

    4. Run `./scripts/bump-version.sh` to update both versions

    5. Commit, run `./scripts/release-pretag-guard.sh`, tag, and push'
  enforceability: cross_event
  topic: DevOps
  expressible: null
- statement_id: 84
  text: 'Before creating a release tag, run:


    ```bash

    ./scripts/release-pretag-guard.sh

    ```


    If it fails, run `./scripts/bump-version.sh`, commit the build-number bump, then retry tagging.'
  enforceability: cross_event
  topic: DevOps
  expressible: null
- statement_id: 85
  text: 'Manual release steps (if not using the command):


    ```bash

    ./scripts/release-pretag-guard.sh

    git tag vX.Y.Z

    git push origin vX.Y.Z

    gh run watch --repo manaflow-ai/cmux

    ```'
  enforceability: per_event
  topic: DevOps
  expressible: null
