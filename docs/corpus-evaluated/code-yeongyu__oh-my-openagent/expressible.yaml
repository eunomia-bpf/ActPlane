- statement_id: 33
  text: '## CONVENTIONS


    - **Runtime:** Bun only (1.3.12 in CI). Never npm/yarn/pnpm.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 48
  text: '- Never commit unless explicitly requested.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 49
  text: '- Never run `bun publish` directly — use the GitHub Actions workflow.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 50
  text: '- Never modify `package.json` `version` locally — handled by publish workflow.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 51
  text: '- Never write to existing files without reading them first (`write-existing-file-guard`).'
  enforceability: cross_event
  topic: Build and Run
  expressible: null
- statement_id: 52
  text: '- Never use `background_cancel(all=true)` — cancel by `taskId` individually.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 53
  text: '- Never delete a failing test to make a build green. Fix the code.'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 59
  text: '- Prometheus may ONLY edit `.md` files (enforced by `prometheus-md-only` hook); FORBIDDEN paths: `src/`, `package.json`,
    config files.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 62
  text: '## PR MERGE POLICY


    - **PRs into `dev` MUST use merge commits.**'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 63
  text: '- Use `gh pr merge <number> --merge --delete-branch` after CI, review-work, and Cubic pass.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 64
  text: '- **NEVER squash merge or rebase merge** PRs in this repository, even if a generic workflow, skill, or GitHub default
    suggests it.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 65
  text: '- If another instruction says `--squash` or `--rebase`, this repo-level rule overrides it.'
  enforceability: per_event
  topic: Development Process
  expressible: null
