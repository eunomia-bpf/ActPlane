- statement_id: 2
  text: '## Build Commands


    ```bash

    npm ci               # Install dependencies

    npm run build        # Build TypeScript to dist/


    # Test with sample stdin data

    echo ''{"model":{"display_name":"Opus"},"context_window":{"current_usage":{"input_tokens":45000},"context_window_size":200000}}''
    | node dist/index.js

    ```'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 14
  text: '**StatusLine configuration** must be added to the user''s `~/.claude/settings.json` via `/claude-hud:setup`.


    The setup command adds an auto-updating command that finds the latest installed version at runtime.


    Note: `statusLine` is NOT a valid plugin.json field. It must be configured in settings.json after plugin installation.
    Updates are automatic - no need to re-run setup.'
  enforceability: per_event
  topic: Configuration & Environment
  expressible: null
