- statement_id: 4
  text: '### Unit Testing


    Tests must be run from within the specific package directory, not the project

    root.'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 5
  text: '**Run individual test files** (always preferred):


    ```bash

    cd packages/core && npx vitest run src/path/to/file.test.ts

    cd packages/cli && npx vitest run src/path/to/file.test.ts

    ```'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 7
  text: '**Avoid:**


    - `npm run test -- --filter=...` — does NOT filter; runs the entire suite'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 8
  text: "- `npx vitest` from the project root — fails due to package-specific vitest\n  configs"
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 21
  text: "## Development Guidelines\n\n### General workflow\n\n1. **Design doc for non-trivial work** — write one in `.qwen/design/`\
    \ if the\n   change touches multiple files or involves design decisions. Skip for small\n   bugfixes.\n2. **Test plan\
    \ for behavioral changes** — write an E2E test plan in\n   `.qwen/e2e-tests/` when the change affects user-observable\
    \ behavior. Dry-run\n   against the global `qwen` CLI first to confirm the baseline.\n3. **Build + typecheck before declaring\
    \ done**:\n   `npm run build && npm run typecheck`.\n4. **Code review** — run `/review` when available. Triage each comment:\n\
    \   valid / false positive / overthinking."
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 22
  text: '### Feature development


    Use the `/feat-dev` skill for the full workflow: investigate, design, test plan,

    dry-run, implement, verify, code review, and iterate.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 23
  text: '### Bugfix


    Use the `/bugfix` skill for the reproduce-first workflow: reproduce, fix,

    verify, test, and code review.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 24
  text: '## GitHub Operations


    Use the `gh` CLI for all GitHub-related operations — issues, pull requests,

    comments, CI checks, releases, and API calls. Prefer `gh issue view`,

    `gh pr view`, `gh pr checks`, `gh run view`, `gh api`, etc. over web fetches

    or manual REST calls.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 26
  text: "- **Hard bugs**: use the `structured-debugging` skill when debugging requires\n  more than a quick glance — especially\
    \ when the first attempt at a fix didn't\n  work or the behavior seems impossible."
  enforceability: per_event
  topic: Testing
  expressible: null
