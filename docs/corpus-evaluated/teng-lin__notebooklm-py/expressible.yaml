- statement_id: 3
  text: '## Build, Test, and Development Commands


    Canonical contributor install (full guide: [docs/installation.md](docs/installation.md)):


    ```bash

    uv sync --frozen --extra browser --extra dev --extra markdown

    source .venv/bin/activate

    uv run playwright install chromium

    uv run pytest

    uv run pytest -n auto --dist=worksteal  # optional faster local run

    uv run ruff check .

    uv run ruff format .

    uv run mypy src/notebooklm

    uv run pre-commit run --all-files

    ```


    Run `uv run pytest tests/e2e -m readonly` only after `notebooklm login` and setting test notebook env vars.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 9
  text: '- Isolate concurrent runs with `NOTEBOOKLM_PROFILE=agent-<id>` so each agent gets its own context file under `~/.notebooklm/profiles/<name>/`.
    Fall back to `NOTEBOOKLM_HOME=/tmp/agent-<id>` only when separate home directories are required.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 10
  text: '- In headless environments where Playwright login is impractical, authenticate with `notebooklm login --browser-cookies
    <browser>` (requires `pip install "notebooklm-py[cookies]"`).'
  enforceability: per_event
  topic: AI Integration
  expressible: null
