- statement_id: 4
  text: '## Development Commands


    > **Note**: If rtk is installed, prefer `rtk <cmd>` over raw commands for token-optimized output.

    > All commands work with passthrough support even for subcommands rtk doesn''t specifically handle.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 8
  text: '### Pre-commit Gate

    ```bash

    cargo fmt --all && cargo clippy --all-targets && cargo test --all

    ```'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 29
  text: '## Build Verification (Mandatory)


    **CRITICAL**: After ANY Rust file edits, ALWAYS run the full quality check pipeline before committing:


    ```bash

    cargo fmt --all && cargo clippy --all-targets && cargo test --all

    ```'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 30
  text: '**Rules**:

    - Never commit code that hasn''t passed all 3 checks'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 31
  text: '- Fix ALL clippy warnings before moving on (zero tolerance)'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 32
  text: '- If build fails, fix it immediately before continuing to next task'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 33
  text: '**Performance verification** (for filter changes):

    ```bash

    hyperfine ''rtk git log -10'' --warmup 3          # before

    cargo build --release

    hyperfine ''target/release/rtk git log -10'' --warmup 3  # after (should be <10ms)

    ```'
  enforceability: per_event
  topic: Implementation Details
  expressible: null
- statement_id: 34
  text: '## Working Directory Confirmation


    **ALWAYS confirm working directory before starting any work**:


    ```bash

    pwd  # Verify you''re in the rtk project root

    git branch  # Verify correct branch (main, feature/*, etc.)

    ```'
  enforceability: per_event
  topic: Development Process
  expressible: null
