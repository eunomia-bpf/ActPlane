- statement_id: 2
  text: '## Question Tool


    When you need to ask the user ANY question — including simple yes/no, confirmations, and clarifications — ALWAYS use the
    `ask_user` tool. Never ask questions in plain text. The Superset UI renders `ask_user` calls as an interactive overlay
    with clickable option buttons; plain-text questions will not be surfaced to the user in the same way.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 6
  text: '- **Next.js**: Version 16 - NEVER create `middleware.ts`. Next.js 16 renamed middleware to `proxy.ts`. Always use
    `proxy.ts` for request interception.'
  enforceability: per_event
  topic: Architecture
  expressible: null
- statement_id: 8
  text: '## Code Quality


    **Biome runs at root level** (not per-package) for speed:

    - `biome check --write --unsafe` = format + lint + organize imports + fix all auto-fixable issues

    - `biome check` = check only (no changes)

    - `biome format` = format only

    - Use `bun run lint:fix` to fix all issues automatically'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 10
  text: 2. **Prefer `gh` CLI** - when performing git operations (PRs, issues, checkout, etc.), prefer the GitHub CLI (`gh`)
    over raw `git` commands where possible
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 11
  text: 3. **Shared command and skill source** - keep command definitions in `.agents/commands/` and skill definitions in
    `.agents/skills/`. `.claude/commands` and `.cursor/commands` should be symlinks to `../.agents/commands`; `.claude/skills`
    should be a symlink to `../.agents/skills`. (`packages/chat` discovers slash commands from `.claude/commands`.) Skills
    aren't a cross-agent format yet, so non-Claude agents (Codex, Cursor, OpenCode) should read the relevant `.agents/skills/*/SKILL.md`
    file directly when its description matches the task.
  enforceability: per_event
  topic: Configuration & Environment
  expressible: null
- statement_id: 12
  text: 4. **Workspace MCP config** - keep shared MCP servers in `.mcp.json`; `.cursor/mcp.json` should link to `../.mcp.json`.
    Codex uses `.codex/config.toml` (run with `CODEX_HOME=.codex codex ...`). OpenCode uses `opencode.json` and should mirror
    the same MCP set using OpenCode's `remote`/`local` schema.
  enforceability: per_event
  topic: Configuration & Environment
  expressible: null
- statement_id: 13
  text: 5. **Mastra dependencies** - use the published upstream `mastracode` and `@mastra/*` packages. Do not add fork tarball
    overrides or custom patch steps unless explicitly requested.
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 14
  text: 6. **Plan & doc placement** - implementation plans go in `plans/` (cross-cutting) or `apps/<app>/plans/` (app-scoped);
    shipped plans move to `plans/done/`. Architecture/reference docs go in `<app>/docs/`. Never drop `*_PLAN.md` at an app
    root or inside `src/`.
  enforceability: per_event
  topic: Documentation
  expressible: null
- statement_id: 15
  text: 7. **Always fix lint warnings before pushing** - CI fails on Biome warnings, not just errors (the lint script treats
    warnings as errors). Run `bun run lint:fix` after edits and verify `bun run lint` exits 0 before `git push`. Never push
    code that produces lint output, even auto-fixable formatting.
  enforceability: cross_event
  topic: Build and Run
  expressible: null
- statement_id: 24
  text: '## Database Rules


    ** IMPORTANT ** - Never touch the production database unless explicitly asked to. Even then, confirm with the user first.'
  enforceability: per_event
  topic: Security
  expressible: null
- statement_id: 26
  text: '## DB migrations

    - Always spin up a new neon branch to create migrations. Update our root .env files to point at the neon branch locally.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 27
  text: '- Use drizzle to manage the migration. You can see the schema at packages/db/src/schema. Never run a migration yourself.'
  enforceability: per_event
  topic: Implementation Details
  expressible: null
- statement_id: 28
  text: '- Create migrations by changing drizzle schema then running `bunx drizzle-kit generate --name="<sample_name_snake_case>"`'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 31
  text: '- **NEVER manually edit files in `packages/db/drizzle/`** - this includes `.sql` migration files, `meta/_journal.json`,
    and snapshot files. These are auto-generated by Drizzle. If you need to create a migration, only modify the schema files
    in `packages/db/src/schema/` and ask the user to run `drizzle-kit generate`.'
  enforceability: per_event
  topic: Development Process
  expressible: null
