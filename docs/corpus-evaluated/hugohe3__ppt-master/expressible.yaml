- statement_id: 2
  text: '**You MUST read [`skills/ppt-master/SKILL.md`](skills/ppt-master/SKILL.md) before any PPT generation task or repo
    modification.** This repository exists to generate presentations; SKILL.md is the authoritative workflow that owns project
    creation, role switching, serial execution, quality gates, post-processing, export, and every per-step command. The rest
    of this file only points to where related material lives — it never substitutes for SKILL.md.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 4
  text: '> Topic-only requests with no source material: run the standalone [`topic-research`](skills/ppt-master/workflows/topic-research.md)
    workflow before SKILL.md Step 1 to gather web materials.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 5
  text: '>

    > Phase B resumption (split-mode execution): when the user opens a fresh chat and says "继续生成 projects/<x>" or similar,
    run the standalone [`resume-execute`](skills/ppt-master/workflows/resume-execute.md) workflow to enter Phase B (SVG generation
    + export) without re-running Phase A.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 6
  text: '>

    > Decks containing data charts: run the standalone [`verify-charts`](skills/ppt-master/workflows/verify-charts.md) workflow
    between the executor and post-processing steps to calibrate chart coordinates.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 7
  text: '>

    > Recorded narration / video export: run the standalone [`generate-audio`](skills/ppt-master/workflows/generate-audio.md)
    workflow after post-processing.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 8
  text: '>

    > Object-level animation tuning: when the user asks to change animation order, effect, timing, or a specific object''s
    reveal behavior, run the standalone [`customize-animations`](skills/ppt-master/workflows/customize-animations.md) workflow.
    Default export already has global animations; do not create `animations.json` unless customization was requested.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 9
  text: '>

    > Live preview: any time the user mentions "live preview", "preview", "看效果", or wants to click/select a slide element,
    run [`live-preview`](skills/ppt-master/workflows/live-preview.md). Step 6 auto-starts it during generation; the workflow
    covers post-export re-entry and applying submitted annotations.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 10
  text: '>

    > Brand identity setup: when the user asks to "set up brand" / "建立品牌" / "做品牌规范", provides a brand asset (logo / brand
    site URL / branded PPTX / brand PDF), or wants to extract a brand from existing materials, run the standalone [`create-brand`](skills/ppt-master/workflows/create-brand.md)
    workflow. Output goes to `skills/ppt-master/templates/brands/<id>/`. Brands apply at SKILL.md Step 3 via the same explicit-path
    rule as layout templates — the user supplies the brand directory path to apply it; bare brand names never trigger.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 11
  text: '>

    > Visual self-check: only when the user explicitly requests a per-page visual review on the generated SVGs (e.g., "跑一下视觉自检
    / 视觉回看 / 视觉 rubric", "visual review", "check each page visually"), run the standalone [`visual-review`](skills/ppt-master/workflows/visual-review.md)
    workflow between the executor and post-processing steps. The main pipeline does NOT invoke it automatically; do not infer
    or recommend it from deck size, model identity, or any other signal — user request is the only trigger.'
  enforceability: per_event
  topic: Development Process
  expressible: null
