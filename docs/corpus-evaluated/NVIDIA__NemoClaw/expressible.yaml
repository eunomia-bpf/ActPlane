- statement_id: 4
  text: '## Quick Reference


    | Task | Command |

    |------|---------|

    | Install all deps | `npm install && npm link && cd nemoclaw && npm install && npm run build && cd .. && cd nemoclaw-blueprint
    && uv sync && cd ..` |

    | Build plugin | `cd nemoclaw && npm run build` |

    | Watch mode | `cd nemoclaw && npm run dev` |

    | Run all tests | `npm test` |

    | Run plugin tests | `cd nemoclaw && npm test` |

    | Run all linters | `make check` |

    | Run all hooks manually | `npx prek run --all-files` |

    | Type-check CLI | `npm run typecheck:cli` |

    | Auto-format | `make format` |

    | Build docs | `make docs` |

    | Serve docs locally | `make docs-live` |'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 18
  text: '## Working with This Repo


    ### Before Making Changes


    1. Read `CONTRIBUTING.md` for the full contributor guide

    2. Run `make check` to verify your environment is set up correctly

    3. Check that `npm test` passes before starting'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 19
  text: '### Common Patterns


    **Adding a CLI command:**


    - Entry point: `bin/nemoclaw.js` (launches the compiled CLI in `dist/`)

    - Main CLI implementation lives in `src/lib/` and compiles to `dist/lib/`

    - Add tests in `test/`'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 20
  text: '**Adding a plugin feature:**


    - Source: `nemoclaw/src/`

    - Co-locate tests as `*.test.ts`

    - Build with `cd nemoclaw && npm run build`'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 24
  text: '## Documentation


    - Source of truth: `docs/` directory

    - `.agents/skills/nemoclaw-user-*/*.md` is **autogenerated** — never edit directly'
  enforceability: per_event
  topic: Documentation
  expressible: null
- statement_id: 25
  text: '- User skills are generated agent-skill packages, prefixed with `nemoclaw-user-*`, that help AI agents guide end
    users through NemoClaw workflows.

    - For normal docs changes, include only the source pages under `docs/`; the docs-to-skills hook runs in dry-run mode to
    validate generated output.

    - Follow style guide in `docs/CONTRIBUTING.md`

    - **Release prep only:** During release prep, run `nemoclaw-contributor-update-docs`, make doc version bumps, regenerate
    user skills, then open the docs refresh PR with both docs and generated user skills.'
  enforceability: per_event
  topic: Documentation
  expressible: null
- statement_id: 26
  text: '## PR Requirements


    - Create feature branch from `main`

    - Run `make check` and `npm test` before submitting

    - Follow PR template (`.github/PULL_REQUEST_TEMPLATE.md`)

    - Update docs for any user-facing behavior changes

    - No secrets, API keys, or credentials committed

    - Limit open PRs to fewer than 10'
  enforceability: cross_event
  topic: Development Process
  expressible: null
