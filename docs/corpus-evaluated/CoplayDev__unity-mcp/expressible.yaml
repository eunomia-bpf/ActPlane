- statement_id: 8
  text: '### 3. Delete Rather Than Deprecate

    When removing functionality, delete it completely. No `_unused` renames, no `// removed` comments, no backwards-compatibility
    shims for internal code.'
  enforceability: per_event
  topic: Maintenance
  expressible: null
- statement_id: 9
  text: '### 4. Test Coverage Required

    Every new feature needs tests. Run them before PRs.'
  enforceability: cross_event
  topic: Testing
  expressible: null
- statement_id: 22
  text: '### Adding a New Tool

    1. Add Python MCP tool in `Server/src/services/tools/manage_<domain>.py` using `@mcp_for_unity_tool`

    2. Add Python CLI commands in `Server/src/cli/commands/<domain>.py` using Click

    3. Add C# implementation in `MCPForUnity/Editor/Tools/Manage<Domain>.cs` with `[McpForUnityTool]`

    4. Add Python tests in `Server/tests/test_manage_<domain>.py`

    5. Add Unity tests in `TestProjects/UnityMCPTests/Assets/Tests/`'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 24
  text: '- Don''t add features without tests'
  enforceability: cross_event
  topic: Testing
  expressible: null
