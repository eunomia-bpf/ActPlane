- statement_id: 2
  text: '## CODING ENVIRONMENT


    - Install astral uv using "curl -LsSf https://astral.sh/uv/install.sh | sh" if not already installed and if already installed
    then update it to the latest version'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 3
  text: '- Install Python 3.14.0 stable using `uv python install 3.14.0` if not already installed (requires uv >=0.9; see
    `[tool.uv] required-version` in `pyproject.toml`)'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 4
  text: '- Always use `uv run` to run files instead of the global `python` command.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 7
  text: '- All CI checks must pass; failing checks block merge.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 8
  text: '- Add tests for new changes (including edge cases), then run `uv run pytest`.'
  enforceability: cross_event
  topic: Testing
  expressible: null
- statement_id: 9
  text: '- Run checks in this order: `uv run ruff format`, `uv run ruff check`, `uv run ty check`, `uv run pytest`.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 12
  text: '- Branch protection: set **required status checks** to **all** of those statuses (e.g. **Ban type ignore suppressions**,
    **ruff-format**, **ruff-check**, **ty**, **pytest**—use the exact labels GitHub shows, which may be prefixed with **CI
    /**). Remove **ci** from required checks if it was previously added for the old gate job.'
  enforceability: per_event
  topic: DevOps
  expressible: null
- statement_id: 24
  text: '- **Complete migrations**: When moving modules, update imports to the new owner and remove old compatibility shims
    in the same change unless preserving a published interface is explicitly required.'
  enforceability: cross_event
  topic: Maintenance
  expressible: null
- statement_id: 25
  text: '- **Maximum Test Coverage**: There should be maximum test coverage for everything, preferably live smoke test coverage
    to catch bugs early'
  enforceability: cross_event
  topic: Testing
  expressible: null
- statement_id: 31
  text: '6. **PROPAGATION**: Changes impact multiple files; propagate updates correctly.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
