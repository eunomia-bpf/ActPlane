    # General Guidelines for working with Nx


    - When running tasks (for example build, lint, test, e2e, etc.), always prefer running the task through `nx` (i.e. `nx
    run`, `nx run-many`, `nx affected`) instead of using the underlying tooling directly'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 3
  text: '- When answering questions about the repository, use the `nx_workspace` tool first to gain an understanding of the
    workspace architecture where applicable.'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 4
  text: '- When working in individual projects, use the `nx_project_details` mcp tool to analyze and understand the specific
    project structure and dependencies'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 5
  text: '- For questions around nx configuration, best practices or if you''re unsure, use the `nx_docs` tool to get relevant,
    up-to-date docs. Always use this instead of assuming things about nx configuration'
  enforceability: per_event
  topic: AI Integration
  expressible: null
- statement_id: 6
  text: '- If the user needs help with an Nx configuration or project graph error, use the `nx_workspace` tool to get any
    errors'
  enforceability: per_event
  topic: AI Integration
  expressible: null
