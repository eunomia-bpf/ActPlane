- statement_id: 18
  text: '## Contributing


    Before creating a PR, adding a skill, or preparing any contribution, you MUST read [CONTRIBUTING.md](CONTRIBUTING.md).
    It covers accepted change types, the four skill types and their guidelines, `SKILL.md` format rules, and the pre-submission
    checklist.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 19
  text: '## PR Hygiene


    Before creating a PR, run these checks:


    ```bash

    git diff upstream/main --stat HEAD

    git log upstream/main..HEAD --oneline

    ```


    Show the output and wait for approval. Installation-specific files (group files, .claude/settings.json, local configs)
    should not be included.'
  enforceability: cross_event
  topic: Development Process
  expressible: null
- statement_id: 20
  text: '## Development


    Run commands directly — don''t tell the user to run them.


    ```bash

    # Host (Node + pnpm)

    pnpm run dev          # Host with hot reload

    pnpm run build        # Compile host TypeScript (src/)

    ./container/build.sh  # Rebuild agent container image (nanoclaw-agent:latest)

    pnpm test             # Host tests (vitest)


    # Agent-runner (Bun — separate package tree under container/agent-runner/)

    cd container/agent-runner && bun install   # After editing agent-runner deps

    cd container/agent-runner && bun test      # Container tests (bun:test)

    ```


    Container typecheck is a separate tsconfig — if you edit `container/agent-runner/src/`, run `pnpm exec tsc -p container/agent-runner/tsconfig.json
    --noEmit` from root (or `bun run typecheck` from `container/agent-runner/`).'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 24
  text: '- **`minimumReleaseAgeExclude`**: Never add entries without human sign-off. If a package must bypass the release
    age gate, the human must approve and the entry must pin the exact version being excluded (e.g. `package@1.2.3`), never
    a range.'
  enforceability: per_event
  topic: Security
  expressible: null
- statement_id: 25
  text: '- **`onlyBuiltDependencies`**: Never add packages to this list without human approval — build scripts execute arbitrary
    code during install.'
  enforceability: per_event
  topic: Security
  expressible: null
- statement_id: 26
  text: '- **`pnpm install --frozen-lockfile`** should be used in CI, automation, and container builds. Never run bare `pnpm
    install` in those contexts.'
  enforceability: per_event
  topic: Security
  expressible: null
- statement_id: 30
  text: '**Gotchas — trigger + action:**


    - **Adding or bumping a runtime dep in `container/agent-runner/`** → edit `package.json`, then `cd container/agent-runner
    && bun install` and commit the updated `bun.lock`. Do not run `pnpm install` there — agent-runner is not a pnpm workspace.'
  enforceability: cross_event
  topic: Build and Run
  expressible: null
- statement_id: 31
  text: '- **Bumping `@anthropic-ai/claude-agent-sdk`, `@modelcontextprotocol/sdk`, or any agent-runner runtime dep** → no
    `minimumReleaseAge` policy applies to this tree. Check the release date on npm, pin deliberately, never `bun update` blindly.'
  enforceability: cross_event
  topic: Build and Run
  expressible: null
- statement_id: 33
  text: '- **Adding a test in `container/agent-runner/src/`** → import from `bun:test`, not `vitest`. Vitest runs on Node
    and can''t load `bun:sqlite`. `vitest.config.ts` excludes this tree.'
  enforceability: per_event
  topic: Testing
  expressible: null
- statement_id: 34
  text: '- **Adding a Node CLI the agent invokes at runtime** (like `agent-browser`, `claude-code`, `vercel`) → put it in
    the Dockerfile''s pnpm global-install block, pinned to an exact version via a new `ARG`. Don''t use `bun install -g` —
    that bypasses the pnpm supply-chain policy.'
  enforceability: per_event
  topic: Build and Run
  expressible: null
- statement_id: 35
  text: '- **Changing the Dockerfile entrypoint or the dynamic-spawn command** (`src/container-runner.ts` line ~301) → keep
    `exec bun ...` so signals forward cleanly. The image has no `/app/dist`; don''t reintroduce a tsc build step.'
  enforceability: cross_event
  topic: Build and Run
  expressible: null
