- statement_id: 5
  text: '`copy-assets` (called from `build`) copies `src/db/schema.sql` and all `src/extraction/wasm/*.wasm` files into `dist/`.
    **Any new SQL or grammar wasm must be copied or it won''t ship.**'
  enforceability: cross_event
  topic: Build and Run
  expressible: null
- statement_id: 30
  text: '- All installer changes need matching coverage in `__tests__/installer-targets.test.ts` — there are ~47 parameterized
    contract tests covering install idempotency, sibling preservation, uninstall reverses install, byte-equal re-runs returning
    `unchanged`, and partial-state recovery for Codex.'
  enforceability: cross_event
  topic: Testing
  expressible: null
- statement_id: 40
  text: '## Windows validation (Parallels + SSH)


    For any Windows-specific PR, bug, or implementation, validate it on the real Windows VM rather than guessing. Connection
    details live in the gitignored **`.parallels`** file at the repo root (VM name, guest IP, SSH user/key). `prlctl exec`
    needs Parallels Pro and is unavailable, so SSH is the bridge.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 42
  text: '- Clone fresh into a **Windows-local** path (`C:\dev\codegraph`) and `npm ci` there — never run npm against the shared
    Mac repo, since `esbuild`/`rollup` ship platform-specific binaries.'
  enforceability: per_event
  topic: Development Process
  expressible: null
- statement_id: 51
  text: '**Do not run `npm publish`, `git push`, or `git tag` yourself** — these are

    publish actions on shared state. Write the files, hand the user the commands.'
  enforceability: per_event
  topic: DevOps
  expressible: null
- statement_id: 52
  text: '## House rules


    - The `0.7.x` line is in active multi-agent rollout. Any change to `src/installer/` (especially `targets/`) needs corresponding
    test coverage and a CHANGELOG entry — installer regressions break every new install silently.'
  enforceability: cross_event
  topic: Maintenance
  expressible: null
- statement_id: 53
  text: '- When changing what the MCP tools do or how agents should use them, update **all three** of `src/mcp/server-instructions.ts`,
    `src/installer/instructions-template.ts`, and `.cursor/rules/codegraph.mdc` — they''re written to different places but
    say the same thing.'
  enforceability: cross_event
  topic: Maintenance
  expressible: null
