    text: |

      ## Architecture

      ```
      ┌─────────────────────────────────────────────────┐
      │                   cmd/cc-connect                │  ← entry point, CLI, daemon
      ├─────────────────────────────────────────────────┤
      │                     config/                     │  ← TOML config parsing
      ├─────────────────────────────────────────────────┤
      │                      core/                      │  ← engine, interfaces, i18n,
      │                                                 │     cards, sessions, registry
      ├──────────────────────┬──────────────────────────┤
      │     agent/           │      platform/           │
      │  ├── claudecode/     │  ├── feishu/             │
      │  ├── codex/          │  ├── telegram/           │
      │  ├── cursor/         │  ├── discord/            │
      │  ├── gemini/         │  ├── slack/              │
      │  ├── iflow/          │  ├── dingtalk/           │
      │  ├── opencode/       │  ├── wecom/              │
      │  ├── acp/            │  ├── qq/                 │
      │  └── qoder/          │  ├── qqbot/              │
      │                      │  ├── line/               │
      │                      │  └── weibo/              │
      ├──────────────────────┴──────────────────────────┤
      │                     daemon/                     │  ← systemd/launchd service
      └─────────────────────────────────────────────────┘
      ```

    type: description
    topic: Architecture
    enforceability: null
    confidence: high

