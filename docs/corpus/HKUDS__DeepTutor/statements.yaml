      # DeepTutor вҖ” Agent-Native Architecture

      ## Overview

      DeepTutor is an **agent-native** intelligent learning companion organized
      around a two-layer plugin model вҖ” single-shot **Tools** invoked by the
      LLM, and multi-stage **Capabilities** that take over a turn вҖ” exposed
      through three entry points: CLI, WebSocket API, and Python SDK.
    type: description
    topic: System Overview
    enforceability: null
    confidence: high

