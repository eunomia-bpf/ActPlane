      ## Dependency Layers

      Public install paths and source extras are defined in `pyproject.toml`.
      Requirements files mirror the same dependency groups for Docker/CI installs.

      ```
      pip install deeptutor      вҖ” Full app (CLI + Web/API + packaged Web assets)
      pip install deeptutor-cli  вҖ” CLI-only (LLM + RAG + providers + document parsing)
      pip install -e .           вҖ” Source install for development
      .[tutorbot]       вҖ” Full app + TutorBot agent engine + channel SDKs
      .[matrix]         вҖ” Matrix channel for TutorBot (matrix-nio[e2e]; needs libolm)
      .[math-animator]  вҖ” Manim addon (powers `visualize` Manim renders + `deeptutor animate`)
      .[dev]            вҖ” Full app + test/lint tools
      .[all]            вҖ” Everything above
      ```
    type: description
    topic: Build and Run
    enforceability: null
    confidence: high
