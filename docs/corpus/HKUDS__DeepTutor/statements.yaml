      ### Level 2 вҖ” Capabilities

      Multi-stage pipelines that own the turn:

      | Capability       | Stages                                                |
      | ---------------- | ----------------------------------------------------- |
      | `chat`           | thinking вҶ’ acting вҶ’ observing вҶ’ responding (agentic loop, default) |
      | `auto`           | analyzing вҶ’ delegating вҶ’ synthesizing (routes to another capability) |
      | `deep_solve`     | planning вҶ’ reasoning вҶ’ writing                        |
      | `deep_question`  | ideation вҶ’ generation                                 |
      | `deep_research`  | rephrasing вҶ’ decomposing вҶ’ researching вҶ’ reporting    |
      | `visualize`      | analyzing вҶ’ generating вҶ’ reviewing (SVG / Chart.js / Mermaid / HTML; or routes to Manim sub-stages via `render_type`) |
      | `math_animator`  | concept_analysis вҶ’ concept_design вҶ’ code_generation вҶ’ code_retry вҶ’ summary вҶ’ render_output |

      All capabilities converge on `emit_capability_result()` in
      `deeptutor/capabilities/_shared.py` so every turn emits the same envelope
      (response payload + `cost_summary` from `UsageTracker`). Status copy and
      prompts are i18n'd via `capabilities/prompts/{en,zh}/<name>.yaml`.
    type: description
    topic: Architecture
    enforceability: null
    confidence: high

