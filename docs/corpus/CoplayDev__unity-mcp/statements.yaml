      ### Python CLI Error Handling
      CLI commands (not MCP tools) use the `@handle_unity_errors` decorator:
      ```python
      @handle_unity_errors
      async def my_command(ctx, ...):
          result = await call_unity_tool(...)
      ```
    type: description
    topic: Implementation Details
    enforceability: null
    confidence: high

  - id: 14
