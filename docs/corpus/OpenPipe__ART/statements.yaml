      ## uv package manager by default

      This project uses the `uv` package manager.

      - To add a dependency, run `uv add <package>`.
      - To run a script, run `uv run <script>`.
      - To examine dependencies, consult the `pyproject.toml` file.

    type: directive
    topic: Build and Run
    enforceability: null
    confidence: high

