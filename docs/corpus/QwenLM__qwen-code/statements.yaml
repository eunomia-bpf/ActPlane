    text: |
      ### Development

      ```bash
      npm run dev        # Run CLI directly from TypeScript source (no build needed)
      ```

      Runs the CLI via `tsx` with `DEV=true`. Changes to `packages/core` or
      `packages/cli` are reflected immediately without rebuilding.

    type: description
    topic: Build and Run
    enforceability: null
    confidence: high

