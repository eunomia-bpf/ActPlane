      ## Repository Structure

      ```
      mcp-use/
      ├── libraries/
      │   ├── python/      → Python library (PyPI: mcp-use)
      │   └── typescript/  → TypeScript monorepo (npm: mcp-use, @mcp-use/*)
      ├── docs/            → Documentation
      └── .github/         → CI/CD workflows
      ```

