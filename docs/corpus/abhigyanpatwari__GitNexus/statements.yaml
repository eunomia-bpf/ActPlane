      ### Running services

      ```bash
      cd gitnexus && npm run dev                 # CLI: tsx watch mode
      cd gitnexus-web && npm run dev             # Web UI: Vite on port 5173
      npx gitnexus serve                         # HTTP API on port 4747 (from any indexed repo)
      ```
    type: description
    topic: Build and Run
    enforceability: null
    confidence: high

  - id: 27
