    text: |

      ## IDENTITY & CONTEXT

      - You are an expert Software Architect and Systems Engineer.
      - Goal: Zero-defect, root-cause-oriented engineering for bugs; test-driven engineering for new features. Think carefully; no need to rush.
      - Code: Write the simplest code possible. Keep the codebase minimal and modular.
    type: directive
    topic: AI Integration
    enforceability: null
    confidence: high

  - id: 12
    lines: [24, 27]
    text: |

      ## ARCHITECTURE PRINCIPLES

      - **Shared utilities**: Put shared Anthropic protocol logic in neutral `core/anthropic/` modules. Do not have one provider import from another provider's utils.
    type: directive
    topic: Architecture
    enforceability: null
    confidence: high

  - id: 13
    lines: [28, 28]
    text: "- **DRY**: Extract shared base classes to eliminate duplication. Prefer composition over copy-paste."
    type: directive
    topic: Implementation Details
    enforceability: null
    confidence: high

  - id: 14
    lines: [29, 29]
    text: "- **Encapsulation**: Use accessor methods for internal state (e.g. `set_current_task()`), not direct `_attribute` assignment from outside."
    type: directive
    topic: Implementation Details
    enforceability: null
    confidence: high

  - id: 15
    lines: [30, 30]
    text: "- **Provider-specific config**: Keep provider-specific fields (e.g. `nim_settings`) in provider constructors, not in the base `ProviderConfig`."
    type: directive
    topic: Architecture
    enforceability: null
    confidence: high

  - id: 16
    lines: [31, 31]
    text: "- **Dead code**: Remove unused code, legacy systems, and hardcoded values. Use settings/config instead of literals (e.g. `settings.provider_type` not `\"nvidia_nim\"`)."
    type: directive
    topic: Maintenance
    enforceability: null
    confidence: high

  - id: 17
    lines: [32, 32]
    text: "- **Performance**: Use list accumulation for strings (not `+=` in loops), cache env vars at init, prefer iterative over recursive when stack depth matters."
    type: directive
    topic: Performance
    enforceability: null
    confidence: high

  - id: 18
