      ## Common tasks

      ```sh
      # Build
      cargo build

      # Run TUI
      cargo run

      # Run CLI mode
      cargo run -- --cli

      # Run specific subcommand
      cargo run -- system
      cargo run -- fit --perfect -n 5
      cargo run -- search "llama"

      # Refresh model database
      python3 scripts/scrape_hf_models.py && cargo build

      # Check for compilation issues
      cargo check

      # Format code
      cargo fmt

      # Lint
      cargo clippy
      ```
