    text: |
      - Fit is VRAM-first. GPU inference with sufficient VRAM is the ideal path. CPU inference via system RAM is a fallback. The `RunMode` enum tracks which memory pool is being used (Gpu, CpuOffload, CpuOnly).
    type: description
    topic: Architecture
    enforceability: null
    confidence: high

  - id: 22
