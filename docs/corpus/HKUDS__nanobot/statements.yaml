  - id: 6
    lines: [39, 40]
    text: |
      - **Agent Loop** (`nanobot/agent/loop.py`, `runner.py`): The core processing engine. `AgentLoop` manages session keys, hooks, and context building. `AgentRunner` executes the multi-turn LLM conversation with tool execution.

    type: description
    topic: Architecture
    enforceability: null
    confidence: high

  - id: 7
    lines: [40, 41]
    text: |
      - **LLM Providers** (`nanobot/providers/`): Provider implementations (Anthropic, OpenAI-compatible, OpenAI Responses API, Azure, Bedrock, GitHub Copilot, OpenAI Codex, etc.) built on a common base (`base.py`). Includes image generation (`image_generation.py`) and audio transcription (`transcription.py`). `factory.py` and `registry.py` handle instantiation and model discovery.

    type: description
    topic: Architecture
    enforceability: null
    confidence: high

  - id: 8
    lines: [41, 42]
    text: |
      - **Channels** (`nanobot/channels/`): Platform integrations (Telegram, Discord, Slack, Feishu, Matrix, WhatsApp, QQ, WeChat, WeCom, DingTalk, Email, MoChat, MS Teams, WebSocket). `manager.py` discovers and coordinates them. Channels are auto-discovered via `pkgutil` scan + entry-point plugins.

    type: description
    topic: Architecture
    enforceability: null
    confidence: high

  - id: 9
    lines: [42, 43]
    text: |
      - **Tools** (`nanobot/agent/tools/`): Agent capabilities exposed to the LLM: filesystem (read/write/edit/list), shell execution (with sandbox backends), web search/fetch, MCP servers, cron, notebook editing, subagent spawning, long-running tasks / sustained goals (`long_task.py`), image generation, and self-modification. Tools are auto-discovered via `pkgutil` scan + entry-point plugins.

    type: description
    topic: Architecture
    enforceability: null
    confidence: high

  - id: 10
    lines: [43, 44]
    text: |
      - **Memory** (`nanobot/agent/memory.py`): Session history persistence with Dream two-phase memory consolidation. Uses atomic writes with fsync for durability.

    type: description
    topic: Architecture
    enforceability: null
    confidence: high

  - id: 11
    lines: [44, 45]
    text: |
      - **Session Management** (`nanobot/session/`): Per-session history, context compaction, TTL-based auto-compaction (`manager.py`), and sustained goal state tracking (`goal_state.py`).

    type: description
    topic: Architecture
    enforceability: null
    confidence: high

