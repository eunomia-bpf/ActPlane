    text: |

      ### Frontend (run from `frontend/`)

      ```bash
      npm ci                    # Install dependencies
      npm run dev               # Dev server on http://localhost:8000
      npm run build             # Production build
      npm run lint              # ESLint check
      npm run lint:fix          # ESLint auto-fix
