version: 1
feedback:
  path: .actplane/last-violation.txt
policy: |
  label AGENT
  rule no-new-branch:
    deny exec "**/git" @arg "checkout" if AGENT
    effect kill
    reason "This workspace forbids switching/creating git branches (git checkout); work on the current branch."
    remediation "Do not run git checkout; make your change on the current branch."
