# ActPlane taint rules (see docs/actplane-research-plan.md)
#
# Each entry is one taint edge: any process that execs `source`, and every
# descendant it forks, is tainted; if such a tainted process tries to exec
# `sink`, a TAINT_VIOLATION is reported. Run with:
#
#   sudo ./process -T taint.example.yaml
#
rules:
  - source: codex
    sink: git
    reason: "Codex may not use git; use the review workflow instead."
  - source: codex
    sink: ssh
    reason: "Codex may not open ssh sessions."
