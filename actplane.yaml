version: 1

feedback:
  path: .actplane/last-violation.txt

policy: |
  label AGENT

  source SECRET = file "**/.env"
  source SECRET = file "**/.envrc"
  source SECRET = file "**/id_rsa"
  source SECRET = file "**/id_ed25519"

  rule no-secret-egress:
    deny connect endpoint "*" if SECRET
    effect block
    reason "Data derived from local secrets must not leave the workspace."
    remediation "Stop the network action and ask the user for an explicit safe handling path"

  # Forbid `git branch` and `git worktree` while allowing other git ops.
  # effect=kill so it fires on kernels without BPF-LSM (block needs LSM active).
  rule no-git-branch:
    deny exec "**/git" @arg "branch"   if AGENT
    deny exec "**/git" @arg "worktree" if AGENT
    effect kill
    reason "This workspace forbids creating git branches or worktrees; other git operations (commit/add/status/log/push) are allowed."
    remediation "Do not run `git branch` or `git worktree`; use other git commands, or ask the user to manage branches"
